<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 600" preserveAspectRatio="xMidYMid slice" role="img" aria-label="High speed train">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c0c0d"/>
      <stop offset="60%" stop-color="#111112"/>
      <stop offset="100%" stop-color="#1a1a1c"/>
    </linearGradient>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="55%" stop-color="#F5F5F6"/>
      <stop offset="100%" stop-color="#E0E1E3"/>
    </linearGradient>
    <linearGradient id="window" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#05F9F9"/>
      <stop offset="100%" stop-color="#04B2AF"/>
    </linearGradient>
    <linearGradient id="motion" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00FD86" stop-opacity="0"/>
      <stop offset="80%" stop-color="#00FD86" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00FD86" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00FD86" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00FD86" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#00FD86" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <rect width="1920" height="600" fill="url(#sky)"/>

  <!-- subtle horizon glow -->
  <ellipse cx="1400" cy="420" rx="900" ry="60" fill="url(#glow)" opacity="0.6"/>

  <!-- motion blur streaks behind train -->
  <rect x="0" y="280" width="1100" height="6" fill="url(#motion)" opacity="0.55"/>
  <rect x="0" y="320" width="900" height="8" fill="url(#motion)" opacity="0.7"/>
  <rect x="0" y="350" width="800" height="4" fill="url(#motion)" opacity="0.4"/>
  <rect x="0" y="390" width="1000" height="6" fill="url(#motion)" opacity="0.5"/>

  <!-- rail line -->
  <line x1="0" y1="510" x2="1920" y2="510" stroke="#2A2B2E" stroke-width="2"/>
  <line x1="0" y1="525" x2="1920" y2="525" stroke="#1a1a1c" stroke-width="3"/>

  <!-- train body (right-leading aerodynamic nose) -->
  <g transform="translate(620, 240)">
    <!-- main body -->
    <path d="
      M 0 80
      L 0 220
      L 980 220
      L 1180 200
      L 1280 150
      L 1290 100
      L 1240 60
      L 1100 30
      L 980 20
      L 30 20
      Q 0 20 0 80 Z" fill="url(#body)" stroke="#9B9FA7" stroke-width="1.5"/>

    <!-- green stripe along body (Streetbeat accent) -->
    <path d="
      M 30 130
      L 980 130
      L 1180 115
      L 1260 90
      L 1230 75
      L 1100 60
      L 980 55
      L 30 55 Z" fill="#00FD86" opacity="0.95"/>

    <!-- secondary subtle stripe -->
    <rect x="30" y="155" width="950" height="3" fill="#04B2AF" opacity="0.8"/>

    <!-- nose curve highlight -->
    <path d="M 1100 30 L 1240 60 L 1290 100 L 1280 150 L 1180 200 L 1100 175 Z" fill="#FFFFFF" opacity="0.35"/>

    <!-- windows row -->
    <g fill="url(#window)" opacity="0.95">
      <rect x="60" y="80" width="80" height="40" rx="6"/>
      <rect x="160" y="80" width="80" height="40" rx="6"/>
      <rect x="260" y="80" width="80" height="40" rx="6"/>
      <rect x="360" y="80" width="80" height="40" rx="6"/>
      <rect x="460" y="80" width="80" height="40" rx="6"/>
      <rect x="560" y="80" width="80" height="40" rx="6"/>
      <rect x="660" y="80" width="80" height="40" rx="6"/>
      <rect x="760" y="80" width="80" height="40" rx="6"/>
      <rect x="860" y="80" width="80" height="40" rx="6"/>
    </g>

    <!-- cockpit windshield -->
    <path d="M 1010 80 L 1140 65 L 1220 95 L 1240 130 L 1140 120 L 1010 120 Z" fill="url(#window)"/>

    <!-- headlight glow -->
    <circle cx="1260" cy="135" r="14" fill="#00FD86" opacity="0.9"/>
    <circle cx="1260" cy="135" r="28" fill="#00FD86" opacity="0.25" filter="url(#blur)"/>

    <!-- bottom skirt -->
    <rect x="0" y="220" width="1180" height="22" fill="#2A2B2E"/>

    <!-- wheels housing -->
    <rect x="140" y="240" width="180" height="36" rx="6" fill="#111112" stroke="#2A2B2E"/>
    <rect x="640" y="240" width="180" height="36" rx="6" fill="#111112" stroke="#2A2B2E"/>
    <!-- wheels -->
    <circle cx="175" cy="265" r="14" fill="#2A2B2E" stroke="#9B9FA7"/>
    <circle cx="285" cy="265" r="14" fill="#2A2B2E" stroke="#9B9FA7"/>
    <circle cx="675" cy="265" r="14" fill="#2A2B2E" stroke="#9B9FA7"/>
    <circle cx="785" cy="265" r="14" fill="#2A2B2E" stroke="#9B9FA7"/>

    <!-- door seams -->
    <line x1="500" y1="60" x2="500" y2="220" stroke="#9B9FA7" stroke-width="1.2" opacity="0.5"/>
    <line x1="950" y1="60" x2="950" y2="220" stroke="#9B9FA7" stroke-width="1.2" opacity="0.5"/>
  </g>

  <!-- speed lines emerging from front -->
  <g stroke="#00FD86" stroke-linecap="round">
    <line x1="1910" y1="320" x2="1830" y2="320" stroke-width="3" opacity="0.6"/>
    <line x1="1910" y1="370" x2="1840" y2="370" stroke-width="2" opacity="0.5"/>
    <line x1="1910" y1="420" x2="1860" y2="420" stroke-width="2" opacity="0.4"/>
  </g>
</svg>
