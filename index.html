<!DOCTYPE html>
<html class="staticrypt-html">
<head>
    <meta charset="utf-8" />
    <title>Streetbeat × Investec</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- do not cache this page -->
    <meta http-equiv="cache-control" content="max-age=0" />
    <meta http-equiv="cache-control" content="no-cache" />
    <meta http-equiv="expires" content="0" />
    <meta http-equiv="expires" content="Tue, 01 Jan 1980 1:00:00 GMT" />
    <meta http-equiv="pragma" content="no-cache" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* Streetbeat brand palette only — per brand skill */
        :root {
            --sb-bg: #111112;           /* Neutral/950 */
            --sb-card: #2A2B2E;         /* Neutral/800 */
            --sb-border: #4E5157;       /* Neutral/600 */
            --sb-text: #FFFFFF;         /* Neutral/0 */
            --sb-text-muted: #9B9FA7;   /* Neutral/500 */
            --sb-primary: #00FD86;      /* brand/primary dark */
            --sb-secondary: #05F9F9;    /* brand/secondary dark */
            --sb-negative: #FF5833;     /* feedback/negative */
        }

        * { box-sizing: border-box; }

        .staticrypt-html { height: 100%; }

        .staticrypt-body {
            height: 100%;
            margin: 0;
            background: var(--sb-bg);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: var(--sb-text);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .staticrypt-content {
            height: 100%;
            margin: 0;
            background: transparent;
        }

        .staticrypt-spinner-container {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .staticrypt-spinner {
            display: inline-block;
            width: 2.4rem;
            height: 2.4rem;
            border: 0.22em solid rgba(0, 253, 134, 0.25);
            border-right-color: var(--sb-primary);
            border-radius: 50%;
            animation: spinner-border 0.75s linear infinite;
        }

        @keyframes spinner-border {
            100% { transform: rotate(360deg); }
        }

        .staticrypt-page {
            width: 100%;
            max-width: 460px;
            padding: 64px 24px 24px;
            margin: 0 auto;
            box-sizing: border-box;
        }

        .staticrypt-logo {
            display: flex;
            justify-content: center;
            margin-bottom: 36px;
        }

        .staticrypt-logo img {
            height: 40px;
            width: auto;
            display: block;
        }

        .staticrypt-form {
            position: relative;
            background: var(--sb-card);
            border-radius: 16px;
            padding: 36px 36px 32px;
        }

        .staticrypt-instructions {
            margin-bottom: 24px;
            text-align: left;
        }

        .staticrypt-title {
            font-family: 'Inter', sans-serif;
            font-size: 22px;
            font-weight: 700;
            color: var(--sb-text);
            margin: 0 0 6px;
            letter-spacing: -0.01em;
            line-height: 1.25;
        }

        .staticrypt-instructions p:not(.staticrypt-title) {
            margin: 0;
            color: var(--sb-text-muted);
            font-size: 14px;
            line-height: 1.55;
        }

        .staticrypt-hr {
            margin: 22px 0;
            border: 0;
            border-top: 1px solid var(--sb-border);
            opacity: 0.35;
        }

        .staticrypt-password-container {
            position: relative;
            background: var(--sb-bg);
            border: 1px solid var(--sb-border);
            border-radius: 10px;
            margin: 0 0 14px;
            transition: border-color 0.18s, background 0.18s;
        }

        .staticrypt-password-container:focus-within {
            border-color: var(--sb-primary);
        }

        .staticrypt-form input[type="password"],
        .staticrypt-form input[type="text"] {
            background: transparent;
            border: 0;
            box-sizing: border-box;
            color: var(--sb-text);
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            outline: 0;
            padding: 14px 44px 14px 16px;
            width: 100%;
        }

        .staticrypt-form input[type="password"]::placeholder,
        .staticrypt-form input[type="text"]::placeholder {
            color: var(--sb-text-muted);
        }

        .staticrypt-toggle-password-visibility {
            cursor: pointer;
            height: 18px;
            opacity: 0.55;
            padding: 13px;
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            filter: invert(85%);
            transition: opacity 0.18s;
        }

        .staticrypt-toggle-password-visibility:hover {
            opacity: 0.95;
        }

        label.staticrypt-remember {
            display: flex;
            align-items: center;
            margin: 0 0 18px;
            color: var(--sb-text-muted);
            font-size: 14px;
            cursor: pointer;
            user-select: none;
        }

        .staticrypt-remember input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border: 1.5px solid var(--sb-border);
            border-radius: 5px;
            margin-right: 10px;
            background: transparent;
            cursor: pointer;
            position: relative;
            transition: all 0.18s;
        }

        .staticrypt-remember input[type="checkbox"]:checked {
            background: var(--sb-primary);
            border-color: var(--sb-primary);
        }

        .staticrypt-remember input[type="checkbox"]:checked::after {
            content: '';
            position: absolute;
            left: 5px;
            top: 1px;
            width: 5px;
            height: 10px;
            border: solid var(--sb-bg);
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }

        .staticrypt-form .staticrypt-decrypt-button {
            text-transform: none;
            outline: 0;
            background: var(--sb-primary);
            width: 100%;
            border: 0;
            padding: 14px 18px;
            color: var(--sb-bg);
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 700;
            border-radius: 100px;
            cursor: pointer;
            letter-spacing: 0.005em;
            transition: background 0.18s, transform 0.1s;
        }

        .staticrypt-form .staticrypt-decrypt-button:hover {
            background: #00CC4F;
        }

        .staticrypt-form .staticrypt-decrypt-button:active {
            transform: translateY(1px);
        }

        .staticrypt-footer {
            margin-top: 28px;
            text-align: center;
            font-size: 12px;
            color: var(--sb-text-muted);
            letter-spacing: 0.02em;
        }

        .hidden { display: none !important; }

        @media screen and (-webkit-min-device-pixel-ratio: 0) {
            .staticrypt-form input[type="password"],
            .staticrypt-form input[type="text"] {
                font-size: 16px;
            }
        }

        @media (max-width: 480px) {
            .staticrypt-page { padding: 40px 18px 18px; }
            .staticrypt-form { padding: 28px 24px 24px; }
            .staticrypt-logo img { height: 32px; }
        }
    </style>
</head>
